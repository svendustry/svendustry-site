<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odin's Hall — The Great Hall of Svendustry</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0806;overflow:hidden;width:100vw;height:100vh;font-family:'Crimson Pro',Georgia,serif}
#scene{width:100vw;height:100vh;position:relative;overflow:hidden}
#hall-bg{width:100%;height:100%;object-fit:cover;object-position:center top;transition:filter 1.5s ease,transform 1.5s ease}
#hall-bg.celebrate{filter:brightness(1.5) saturate(1.8);transform:scale(1.04)}
#overlay{position:absolute;inset:0;pointer-events:none}
#overlay svg{width:100%;height:100%}
#header{position:absolute;top:0;left:0;right:0;z-index:50;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(10,8,6,0.9),transparent)}
.header-title{font-family:'Cinzel Decorative',serif;font-size:16px;color:#E8B86D;letter-spacing:3px}
.header-sub{font-size:10px;color:#3A3530;letter-spacing:3px;font-family:'Cinzel',serif;margin-top:3px}
.ctrl-row{display:flex;gap:10px}
.ctrl-btn{background:transparent;border:1px solid #2C2824;color:#9A8E7A;padding:6px 14px;border-radius:3px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;cursor:pointer}
.ctrl-btn:hover{border-color:#C9933A;color:#C9933A}
.ctrl-btn.fire{border-color:#7A5A1E;color:#C9933A}
#milestone-banner{position:absolute;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:60;opacity:0;transition:opacity 0.6s ease,transform 0.6s ease;pointer-events:none;text-align:center;min-width:520px}
#milestone-banner.show{opacity:1;transform:translateX(-50%) translateY(0)}
.banner-inner{background:rgba(10,8,6,0.94);border:1px solid #C9933A;border-radius:4px;padding:18px 36px}
.banner-rune{font-family:'Cinzel',serif;font-size:12px;color:#C9933A;letter-spacing:6px;margin-bottom:8px}
.banner-title{font-family:'Cinzel',serif;font-size:17px;color:#E8B86D;letter-spacing:2px;margin-bottom:6px}
.banner-desc{font-size:13px;color:#9A8E7A;font-style:italic}
#agent-tooltip{position:absolute;background:rgba(10,8,6,0.96);border:0.5px solid #2C2824;border-radius:4px;padding:10px 14px;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:70;min-width:180px}
.tt-name{font-family:'Cinzel',serif;font-size:13px;color:#E8B86D;margin-bottom:3px}
.tt-role{font-size:11px;color:#9A8E7A;margin-bottom:3px}
.tt-task{font-size:11px;color:#4A4038;font-style:italic}
#particles-canvas{position:absolute;inset:0;pointer-events:none;z-index:40;opacity:0;transition:opacity 0.5s}
#particles-canvas.show{opacity:1}
#legend{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:20px;padding:7px 18px;background:rgba(10,8,6,0.8);border:0.5px solid #1A1714;border-radius:20px;z-index:50}
.leg{display:flex;align-items:center;gap:6px;font-size:10px;color:#3A3530;font-family:'Cinzel',serif;letter-spacing:1px}
.leg-dot{width:7px;height:7px;border-radius:50%}
.agent-fig{cursor:pointer;pointer-events:all}
</style>
</head>

<script>
const agentData = {
  odin:{name:'Odin',role:'Strategic Manager · claude-sonnet-4-6',task:'Presiding over the feast · Governing the hall'},
  thor:{name:'Thor',role:'Software Builder · gemini-flash-lite',task:'Building Route Planner v1 · In progress'},
  frigg:{name:'Frigg',role:'CFO · Budget · gemini-flash-lite',task:'Idle · At the feast'},
  tyr:{name:'Týr',role:'Data Analyst · gemini-flash-lite',task:'Idle · At the feast'},
  mimir:{name:'Mimir',role:'Vending Research · gemini-flash-lite',task:'Report delivered · Resting'},
  bragi:{name:'Bragi',role:'Copy & Docs · gemini-flash-lite',task:'Idle · Quill at rest'},
  heimdall:{name:'Heimdall',role:'Opportunity Scout · gemini-flash-lite',task:'Idle · Watching the horizons'},
  ran:{name:'Rán',role:'Music Trends · gemini-flash-lite',task:'Idle · Reading the tides'},
  freya:{name:'Freya',role:'Music Creator · gemini-flash-lite',task:'Idle · Silent strings'},
  hermod:{name:'Hermod',role:'Distribution · gemini-flash-lite',task:'Idle · Roads are clear'},
  loki:{name:'Loki',role:'Visual Creator · gemini-flash-lite',task:'Idle · In disguise'},
  eivor:{name:'Eivor',role:'Shield-Maiden · gemini-flash-lite',task:'Standing guard at the entrance'}
};

const tt = document.getElementById('agent-tooltip');
function showTip(e, id) {
  const a = agentData[id];
  document.getElementById('tt-name').textContent = a.name;
  document.getElementById('tt-role').textContent = a.role;
  document.getElementById('tt-task').textContent = a.task;
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top = (e.clientY - 50) + 'px';
  tt.style.opacity = '1';
}
function hideTip() { tt.style.opacity = '0'; }

let celebrating = false;
let particles = [];
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

function spawnParticle() {
  return {
    x: 300 + Math.random() * (window.innerWidth - 600),
    y: window.innerHeight * 0.55 + Math.random() * 80,
    vx: (Math.random() - 0.5) * 2.5,
    vy: -(1.5 + Math.random() * 3.5),
    size: 1.5 + Math.random() * 3,
    life: 1,
    decay: 0.006 + Math.random() * 0.01,
    color: Math.random() > 0.5 ? '#E8B86D' : '#C9933A'
  };
}

function animateParticles() {
  if (!celebrating) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < 6; i++) particles.push(spawnParticle());
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}

function triggerMilestone() {
  if (celebrating) return;
  celebrating = true;
  document.getElementById('hall-bg').classList.add('celebrate');
  document.getElementById('particles-canvas').classList.add('show');
  document.getElementById('milestone-banner').classList.add('show');
  particles = [];
  animateParticles();
  setTimeout(() => {
    document.getElementById('milestone-banner').classList.remove('show');
    setTimeout(() => {
      celebrating = false;
      document.getElementById('hall-bg').classList.remove('celebrate');
      document.getElementById('particles-canvas').classList.remove('show');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }, 1500);
  }, 5000);
}
</script>
